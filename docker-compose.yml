services:
  localstack:
    image: localstack/localstack:3.7
    container_name: localstack
    ports:
      - "127.0.0.1:4566:4566"
    environment:
      - SERVICES=s3,sqs
      - DEBUG=0
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - EDGE_PORT=4566
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "bash", "-lc", "awslocal s3api list-buckets >/dev/null 2>&1 && awslocal sqs list-queues >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
