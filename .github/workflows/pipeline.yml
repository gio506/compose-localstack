name: localstack-ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: localstack-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stage-1-structure:
    name: Stage 1 - Structure check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        shell: bash
        run: |
          required_files=(
            "README.md"
            "CHEATSHEET.md"
            "FILES_EXPLAINED.md"
            "docker-compose.yml"
            "scripts/common.sh"
            "scripts/smoke.sh"
          )
          for file in "${required_files[@]}"; do
            test -f "$file" || {
              echo "Missing required file: $file"
              exit 1
            }
          done

  stage-2-syntax:
    name: Stage 2 - Script syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: stage-1-structure
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check script syntax
        run: bash -n scripts/*.sh

  stage-3-compose-config:
    name: Stage 3 - Compose config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: stage-2-syntax
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet

      - name: Ensure scripts are executable
        run: chmod +x scripts/smoke.sh
      - name: Ensure all scripts are executable
        run: chmod +x scripts/*.sh

  stage-4-smoke:
    name: Stage 4 - Run smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: stage-3-compose-config
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start LocalStack
        run: docker compose up -d

      - name: Wait for LocalStack health
        run: |
          for attempt in {1..30}; do
            status="$(docker inspect --format='{{json .State.Health.Status}}' localstack || true)"
            if [ "$status" = "\"healthy\"" ]; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs --no-color
          exit 1

      - name: Run smoke script
        run: ./scripts/smoke.sh

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop services
        if: always()
        run: docker compose down -v

  stage-5-final:
    name: Stage 5 - Final status gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - stage-1-structure
      - stage-2-syntax
      - stage-3-compose-config
      - stage-4-smoke
    steps:
      - name: Aggregate results
        shell: bash
        env:
          STRUCTURE: ${{ needs.stage-1-structure.result }}
          SYNTAX: ${{ needs.stage-2-syntax.result }}
          COMPOSE: ${{ needs.stage-3-compose-config.result }}
          SMOKE: ${{ needs.stage-4-smoke.result }}
        run: |
          for result in "$STRUCTURE" "$SYNTAX" "$COMPOSE" "$SMOKE"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              exit 1
            fi
          done
